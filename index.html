        function gaussBlur(imgData) {
            var pixes = imgData.data;
            var width = imgData.width;
            var height = imgData.height;
            var gaussMatrix = [],
                gaussSum = 0,
                x, y,
                r, g, b, a,
                i, j, k, len;

            var radius = 10;
            var sigma = 5;

            a = 1 / (Math.sqrt(2 * Math.PI) * sigma);
            b = -1 / (2 * sigma * sigma);
            //生成高斯矩阵
            for (i = 0, x = -radius; x <= radius; x++, i++) {
                g = a * Math.exp(b * x * x);
                gaussMatrix[i] = g;
                gaussSum += g;

            }
            //归一化, 保证高斯矩阵的值在[0,1]之间
            for (i = 0, len = gaussMatrix.length; i < len; i++) {
                gaussMatrix[i] /= gaussSum;
            }
            //x 方向一维高斯运算
            for (y = 0; y < height; y++) {
                for (x = 0; x < width; x++) {
                    r = g = b = a = 0;
                    gaussSum = 0;
                    for (j = -radius; j <= radius; j++) {
                        k = x + j;
                        if (k >= 0 && k < width) { //确保 k 没超出 x 的范围
                            //r,g,b,a 四个一组
                            i = (y * width + k) * 4;
                            r += pixes[i] * gaussMatrix[j + radius];
                            g += pixes[i + 1] * gaussMatrix[j + radius];
                            b += pixes[i + 2] * gaussMatrix[j + radius];
                            // a += pixes[i + 3] * gaussMatrix[j];
                            gaussSum += gaussMatrix[j + radius];
                        }
                    }
                    i = (y * width + x) * 4;
                    // 除以 gaussSum 是为了消除处于边缘的像素, 高斯运算不足的问题
                    // console.log(gaussSum)
                    pixes[i] = r / gaussSum;
                    pixes[i + 1] = g / gaussSum;
                    pixes[i + 2] = b / gaussSum;
                    // pixes[i + 3] = a ;
                }
            }
            //y 方向一维高斯运算
            for (x = 0; x < width; x++) {
                for (y = 0; y < height; y++) {
                    r = g = b = a = 0;
                    gaussSum = 0;
                    for (j = -radius; j <= radius; j++) {
                        k = y + j;
                        if (k >= 0 && k < height) { //确保 k 没超出 y 的范围
                            i = (k * width + x) * 4;
                            r += pixes[i] * gaussMatrix[j + radius];
                            g += pixes[i + 1] * gaussMatrix[j + radius];
                            b += pixes[i + 2] * gaussMatrix[j + radius];
                            // a += pixes[i + 3] * gaussMatrix[j];
                            gaussSum += gaussMatrix[j + radius];
                        }
                    }
                    i = (y * width + x) * 4;
                    pixes[i] = r / gaussSum;
                    pixes[i + 1] = g / gaussSum;
                    pixes[i + 2] = b / gaussSum;
                }
            }
            //end
            return imgData;
        }

        function generate_div_bk(div_id, img) {
            var div = document.getElementById(div_id)
            const baseList = []
            // console.log("div size is:" + div.offsetWidth + "*" + div.offsetHeight + "px")
            const canvas = document.createElement("canvas")
            canvas.width = div.offsetWidth
            canvas.height = div.offsetHeight
            var image = new Image()
            // console.log(img)
            image.src = img
            // console.log("Loading image")

            function wait_img_loadding_finish() {
                if (image.complete) {
                    // console.log("Image loadded")
                    // cut image center
                    var dx = 0, dy = 0, dw = canvas.width, dh = canvas.height * 0.8
                    var sw = 0, sh = 0
                    if (image.width / image.height < dw / dh) {
                        sw = image.width
                        sh = image.width * (dh / dw)
                        dy = (image.height - sh) / 2
                    } else {
                        sh = image.height
                        sw = sh * (dw / dh)
                        dx = (image.width - sw) / 2
                    }
                    contact = canvas.getContext('2d')
                    contact.drawImage(
                        image,
                        dx, dy, sw, sh,
                        0, 0, dw, dh)
                    // console.log("contact.width:" + canvas.width + "px, contact.height:" + canvas.height + "px")
                    var imgData = contact.getImageData(0, 0, canvas.width, canvas.height);
                    gaussBlur(imgData)
                    // console.log("imgData.width=" + imgData.width + ", dh=" + dh)
                    // console.log(typeof (imgData.data))
                    // darkening background picture
                    var gray_scale = 0.5
                    for (var y = 0; y < dh; y++) {
                        for (var x = 0; x < imgData.width; x++) {
                            var pixel = (y * imgData.width + x) * 4
                            imgData.data[pixel] = imgData.data[pixel] * gray_scale
                            imgData.data[pixel + 1] = imgData.data[pixel + 1] * gray_scale
                            imgData.data[pixel + 2] = imgData.data[pixel + 2] * gray_scale
                        }
                    }
                    contact.putImageData(imgData, 0, 0);
                    // console.log(contact.canvas.toDataURL("image/png"))
                    div.style.background = 'url("' + contact.canvas.toDataURL("image/png") + '") center / cover no-repeat'
                } else {
                    // console.log("Load fail, reloadding")
                    setTimeout(() => {
                        wait_img_loadding_finish()
                    }, 1);
                }
            }
            wait_img_loadding_finish()
        }
