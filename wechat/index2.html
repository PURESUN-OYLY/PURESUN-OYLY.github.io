<script type="text/javascript ">
    let time = new Date()
    let timestr = formatDate(new Date())
    rtime_obj = document.getElementById('time_text')
    rtime_obj.innerText = timestr
    rtime_obj2 = document.getElementById('time_text2')
    rtime_obj2.innerText = timestr

    function formatDate(time) {
        var date = new Date(time);

        var year = date.getFullYear(),
            month = date.getMonth() + 1, //月份是从0开始的
            day = date.getDate(),
            hour = date.getHours(),
            min = date.getMinutes(),
            sec = date.getSeconds();
        var newTime = year + '-' +
            month.toString().padStart(2, '0') + '-' +
            day.toString().padStart(2, '0') + ' ' +
            hour.toString().padStart(2, '0') + ':' +
            min.toString().padStart(2, '0') + ':' +
            sec.toString().padStart(2, '0')
        return newTime;
    }
</script>
